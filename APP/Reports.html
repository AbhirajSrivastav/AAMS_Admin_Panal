<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - AAMS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">AAMS</div>
        <div class="nav-item"><a href="/" style="color: inherit; text-decoration: none; display: flex; align-items: center;"><i class="fas fa-home"></i><span style="margin-left: 10px;">Home</span></a></div>
        <div class="nav-item"><a href="/student-directory" style="color: inherit; text-decoration: none; display: flex; align-items: center;"><i class="fas fa-users"></i><span style="margin-left: 10px;">Student Directory</span></a></div>
        <div class="nav-item"><a href="/attendance-logs" style="color: inherit; text-decoration: none; display: flex; align-items: center;"><i class="fas fa-clipboard-list"></i><span style="margin-left: 10px;">Attendance Logs</span></a></div>
        <div class="nav-item active"><a href="/reports" style="color: inherit; text-decoration: none; display: flex; align-items: center;"><i class="fas fa-chart-bar"></i><span style="margin-left: 10px;">Reports</span></a></div>
        <div class="nav-item"><a href="/device-status" style="color: inherit; text-decoration: none; display: flex; align-items: center;"><i class="fas fa-hdd"></i><span style="margin-left: 10px;">Device Status</span></a></div>
    </aside>

    <main class="main-content">
        <header>
            <div>
                <input type="text" class="search-bar" placeholder="Search reports...">
                <span id="clock" style="margin-left: 20px; color: #94a3b8; font-size: 14px;"></span>
            </div>
            <div class="user-profile">
                <span><i class="fas fa-circle" style="color: var(--green); font-size: 10px;"></i> ACTIVE</span>
                <span><i class="fas fa-user-circle"></i> Admin</span>
            </div>
        </header>

        <section style="margin-bottom: 30px;">
            <h2 style="color: #fff; margin-bottom: 20px;">Attendance Reports</h2>
            
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
                <div class="card" style="text-align: center;">
                    <h3 style="color: #94a3b8; margin: 0;">Total Students</h3>
                    <p style="font-size: 32px; font-weight: bold; color: #38bdf8; margin: 15px 0 0;">285</p>
                </div>
                <div class="card" style="text-align: center;">
                    <h3 style="color: #94a3b8; margin: 0;">Present This Week</h3>
                    <p style="font-size: 32px; font-weight: bold; color: #22c55e; margin: 15px 0 0;">1,425</p>
                </div>
                <div class="card" style="text-align: center;">
                    <h3 style="color: #94a3b8; margin: 0;">Attendance Rate</h3>
                    <p style="font-size: 32px; font-weight: bold; color: #f59e0b; margin: 15px 0 0;">94.2%</p>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                <div class="card">
                    <div class="card-header">Weekly Attendance Distribution</div>
                    <div style="position: relative; height: 300px;">
                        <canvas id="weeklyChart"></canvas>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">Attendance by Status</div>
                    <div style="position: relative; height: 300px;">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Monthly Attendance Trend</div>
                <div style="position: relative; height: 300px;">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        function initializeReportCharts() {
            // Weekly Chart
            if (document.getElementById('weeklyChart')) {
                const weeklyCtx = document.getElementById('weeklyChart').getContext('2d');
                new Chart(weeklyCtx, {
                    type: 'bar',
                    data: {
                        labels: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'],
                        datasets: [{
                            label: 'Present',
                            data: [275, 278, 280, 282, 285],
                            backgroundColor: '#22c55e',
                            borderColor: '#22c55e',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: '#94a3b8' } }
                        },
                        scales: {
                            y: {
                                ticks: { color: '#94a3b8' },
                                grid: { color: 'rgba(255, 255, 255, 0.1)' }
                            },
                            x: {
                                ticks: { color: '#94a3b8' },
                                grid: { display: false }
                            }
                        }
                    }
                });
            }

            // Status Chart (Pie)
            if (document.getElementById('statusChart')) {
                const statusCtx = document.getElementById('statusChart').getContext('2d');
                new Chart(statusCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Present', 'Absent', 'Late'],
                        datasets: [{
                            data: [260, 15, 10],
                            backgroundColor: ['#22c55e', '#ef4444', '#f59e0b'],
                            borderColor: '#1e293b',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: { color: '#94a3b8' }
                            }
                        }
                    }
                });
            }

            // Monthly Chart
            if (document.getElementById('monthlyChart')) {
                const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
                new Chart(monthlyCtx, {
                    type: 'line',
                    data: {
                        labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                        datasets: [{
                            label: 'Attendance Rate %',
                            data: [92, 93, 94, 94.2],
                            borderColor: '#38bdf8',
                            backgroundColor: 'rgba(56, 189, 248, 0.1)',
                            borderWidth: 3,
                            tension: 0.4,
                            pointRadius: 5,
                            pointBackgroundColor: '#38bdf8',
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: '#94a3b8' } } },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 100,
                                ticks: { color: '#94a3b8' },
                                grid: { color: 'rgba(255, 255, 255, 0.1)' }
                            },
                            x: {
                                ticks: { color: '#94a3b8' },
                                grid: { display: false }
                            }
                        }
                    }
                });
            }
        }

        // Initialize charts when page loads
        if (typeof Chart !== 'undefined') {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => {
                    setTimeout(initializeReportCharts, 100);
                });
            } else {
                setTimeout(initializeReportCharts, 100);
            }
        }
    </script>
</body>
</html>
