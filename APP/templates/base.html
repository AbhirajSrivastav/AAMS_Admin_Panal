<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AAMS{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <aside class="sidebar">
        <div class="logo">AAMS</div>
        <div class="nav-item {% if request.endpoint == 'dashboard.index' %}active{% endif %}">
            <a href="{{ url_for('dashboard.index') }}">
                <i class="fas fa-home"></i><span>Home</span>
            </a>
        </div>
        <div class="nav-item {% if request.endpoint == 'student.student_directory' %}active{% endif %}">
            <a href="{{ url_for('student.student_directory') }}">
                <i class="fas fa-users"></i><span>Student Directory</span>
            </a>
        </div>
        <div class="nav-item {% if request.endpoint == 'attendance.attendance_logs' %}active{% endif %}">
            <a href="{{ url_for('attendance.attendance_logs') }}">
                <i class="fas fa-clipboard-list"></i><span>Attendance Logs</span>
            </a>
        </div>
        <div class="nav-item {% if request.endpoint == 'dashboard.reports' %}active{% endif %}">
            <a href="{{ url_for('dashboard.reports') }}">
                <i class="fas fa-chart-bar"></i><span>Reports</span>
            </a>
        </div>
        <div class="nav-item {% if request.endpoint == 'dashboard.device_status' %}active{% endif %}">
            <a href="{{ url_for('dashboard.device_status') }}">
                <i class="fas fa-hdd"></i><span>Device Status</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header>
            <div>
                <input type="text" class="search-bar" placeholder="Search...">
                <span id="clock" style="margin-left: 20px; color: #94a3b8; font-size: 14px;"></span>
            </div>
            <div class="user-profile">
                <span><i class="fas fa-circle" style="color: var(--green); font-size: 10px;"></i> ACTIVE</span>
                <span><i class="fas fa-user-circle"></i> Admin</span>
            </div>
        </header>

        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
